[package]
name = "k2-core"
version = "0.1.0"
edition = "2021"

[dependencies]
iroh = { version = "0.93.2", features = ["discovery-pkarr-dht"] }
iroh-blobs = { version = "0.95", features = [] }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"
bytes = "1"
rand = "0.9"
