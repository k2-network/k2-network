services:
  postgres:
    image: postgres:16-alpine
    container_name: k2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-k2db}
      POSTGRES_USER: ${POSTGRES_USER:-k2user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-k2user} -d ${POSTGRES_DB:-k2db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - k2-internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: k2-backend
    restart: unless-stopped
    environment:
      K2_SERVER_ADDR: "0.0.0.0:3001"
      DATABASE_URL: postgres://${POSTGRES_USER:-k2user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-k2db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - k2-internal
    volumes:
      - k2-data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: k2-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - k2-internal

  nginx:
    image: nginx:alpine
    container_name: k2-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - k2-internal

  certbot:
    image: certbot/certbot
    container_name: k2-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"

volumes:
  postgres_data:
  k2-data:

networks:
  k2-internal:
    driver: bridge
